<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>星期雨：回旋镖之歌</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #0a0a0c; color: #d1d1d1; font-family: sans-serif; height: 100vh; overflow: hidden; }
        .glitch-text { animation: glitch 1s infinite; color: #ff3e3e; }
        @keyframes glitch { 0% { transform: translate(0); } 20% { transform: translate(-2px, 2px); } 40% { transform: translate(-2px, -2px); } 60% { transform: translate(2px, 2px); } 80% { transform: translate(2px, -2px); } 100% { transform: translate(0); } }
        .option-btn { background: #1a1a1e; border: 1px solid #333; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        .option-btn:active { background: #333; transform: scale(0.98); }
        #content-box { height: 70vh; overflow-y: auto; scrollbar-width: none; }
        #content-box::-webkit-scrollbar { display: none; }
        .pre-wrap { white-space: pre-wrap; word-wrap: break-word; }
    </style>
</head>
<body class="flex flex-col p-6">

    <header class="mb-6 flex justify-between items-end border-b border-gray-800 pb-4">
        <div>
            <h1 class="text-xs font-mono text-gray-500 uppercase tracking-widest">Subject: 星期雨</h1>
            <div id="timeline" class="text-xl font-bold text-white">2025年8月前</div>
        </div>
        <div class="text-right">
            <div class="text-[10px] text-gray-500 uppercase">Mental Stability</div>
            <div id="stability" class="text-green-500 font-mono">100%</div>
        </div>
    </header>

    <main id="content-box" class="flex-grow flex flex-col">
        <div id="narrative" class="animate-in fade-in duration-700">
            <p class="text-lg leading-relaxed mb-6">在2025年的8月前，你是一个有说有笑的正常人。</p>
            <p class="text-gray-500 text-sm italic mb-8">（点击下方开始进入 9 月后的崩坏）</p>
            <button onclick="playScene('scene1')" class="option-btn w-full p-4 rounded-xl text-white font-bold">进入 2025年9月...</button>
        </div>
    </main>

    <footer class="mt-4 pt-4 border-t border-gray-900 text-[10px] text-gray-700 font-mono text-center">
        NO WORDS WASTED / FULL PLOT ARCHIVE
    </footer>

    <script>
        const story = {
            scene1: {
                time: "2025年9月",
                stability: "85%",
                text: "你开始疯疯癫癫，对待以前交好的网友态度悄然发生变化。\n\n【情景1】：你有一位列表叫阿淇，你跟她关系很好。你们互相知道对方的一些三次信息，某一天，你觉得看了很多阿淇发的动态有点不耐烦，你选择：",
                options: [
                    { t: "a. 背后骂她是低龄", next: "scene2_A" },
                    { t: "b. 把她屏蔽，当无事发生", next: "scene1_B" }
                ]
            },
            scene1_B: {
                time: "后续发展",
                stability: "90%",
                text: "【阿淇线B结局：重归于好】\n\n阿淇并未发现任何问题，而你由于长期看不到她动态，也逐渐忘了当初心里的厌烦。\n\n某一天，你又想起来阿淇，并不再屏蔽她，重新开始跟她玩。你们之间的罅隙不再。",
                isEnd: true
            },
            scene2_A: {
                time: "主线：A爆发",
                stability: "60%",
                text: "你选了A，和另一位朋友悄悄吐槽了这件事，日子一天天过去，而你也忘记了这件事。\n\n【情景2】：你有一位列表叫鲨鲨。你变得和以前越来越不一样，经常评论一些莫名其妙的东西。鲨鲨三番两次回复你让你不要再评论了。\n\n直到某一天，鲨鲨点进了你的空间，发现无权限访问，觉得很奇怪，想起前因后果，于是截了一张图发到空间，认为你对她不爽把她屏蔽了。你选择：",
                options: [
                    { t: "a. 想到有前科，去私聊说清楚", next: "scene2_A_End" },
                    { t: "b. 语气很冲地留下解释并拉黑", next: "scene3_A" }
                ]
            },
            scene2_A_End: {
                time: "结局：妥协",
                stability: "75%",
                text: "【鲨鲨线A结局：化解矛盾】\n\n你只是想对所有人锁空间，鲨鲨理解了你的做法，并不再有任何想法。\n\n虽然你对待阿淇的态度日渐显现，但大家没当作在说阿淇。",
                isEnd: true
            },
            scene3_A: {
                time: "冲突升级",
                stability: "30%",
                text: "【情景3】：你和鲨鲨有一位共同的列表叫重载，她与你是认识7年的老网友。\n\n由于你对鲨鲨心生不爽，于是语气不善地要求重载把鲨鲨删了。重载表示不理解，但在你的坚持下，还是假装把鲨鲨删了。\n\n然而某一天，你发现鲨鲨依然活跃于重载的动态评论区，你选择：",
                options: [
                    { t: "a. 当众辱骂重载忘恩负义", next: "scene4_Final" },
                    { t: "b. 假装没看见", next: "scene3_B_End" }
                ]
            },
            scene3_B_End: {
                time: "结局：沉默",
                stability: "40%",
                text: "你选择了B。你不考虑前因后果，由于没权利操控别人一切，且重载情面上做足了，你选择了假装没看见。这段关系在沉默中逐渐变质。",
                isEnd: true
            },
            scene4_Final: {
                time: "2026年：大爆发",
                stability: "0%",
                isBad: true,
                text: "【情景4：最终毁灭】\n\n你在空间里肆意辱骂你和鲨鲨、重载之间的共友阿淇，骂她是低龄，接着攻击重载。这一条动态里的话歧视性拉满，然后把重载和阿淇全部删除好友，并在空间里朝所有人大诉苦，说自己怎样被重载背刺，怎样被阿淇恶心。\n\n其他人看见动态发给了重载和阿淇。大家感到很愤怒，把你过去做的所有事都抖落出来：包括你白嫖别人外卖、账号，要求收回共买游戏等不平等条约。\n\n你歧视的东西最终成了回旋镖。大家开始用这些歧视你。",
                finalBlow: "【THE END】\n\n当你骂阿淇低龄的时候，是否想过自己以前对阿淇说过“我不觉得你低龄”？\n\n当你骂重载的时候，是否想过重载作为学生，愿意用自己的钱为你点外卖？"
            }
        };

        function playScene(key) {
            const node = story[key];
            const narrative = document.getElementById('narrative');
            const timeline = document.getElementById('timeline');
            const stability = document.getElementById('stability');

            // 更新状态
            timeline.innerText = node.time;
            stability.innerText = node.stability;
            if (node.isBad) {
                stability.classList.add('glitch-text');
                stability.innerText = "CRITICAL";
            }

            // 构建HTML
            let html = `<div class="animate-in fade-in slide-in-from-bottom-4 duration-500">`;
            html += `<p class="text-lg leading-relaxed mb-6 pre-wrap">${node.text}</p>`;

            if (node.finalBlow) {
                html += `<div class="p-6 bg-red-900/20 border border-red-900 rounded-xl text-red-500 font-bold mb-6 pre-wrap">${node.finalBlow}</div>`;
            }

            if (node.isEnd || node.finalBlow) {
                html += `<button onclick="location.reload()" class="option-btn w-full p-4 rounded-xl text-white font-bold border-white/20">回到 2025年8月...</button>`;
            } else {
                node.options.forEach(opt => {
                    html += `<button onclick="playScene('${opt.next}')" class="option-btn w-full p-4 rounded-xl text-left text-white mb-4 flex justify-between items-center group">
                        <span>${opt.t}</span>
                        <span class="text-gray-600 group-active:text-white">▶</span>
                    </button>`;
                });
            }
            html += `</div>`;

            narrative.innerHTML = html;
            document.getElementById('content-box').scrollTop = 0;
        }
    </script>
</body>
</html>
